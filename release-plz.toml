[workspace]
# git_only = true: use git tags (e.g. v0.2.0) as the version baseline.
# Without this, release-plz queries crates.io to determine the current
# version. Since snowlite is not published to crates.io, the registry
# returns nothing and release-plz silently skips the package entirely.
# publish = false prevents release-plz from running `cargo publish`.
git_only = true
publish = false
git_release_enable = true
semver_check = false

[[package]]
name = "snowlite"
# Use package-scoped tags to avoid collision with the old `v0.2.0` tag
# that was created when the package was still named `local-db`.
# The baseline tag is `snowlite-v0.2.0` at commit 835718a (the rename commit).
tag_name_pattern = "snowlite-v{{version}}"
