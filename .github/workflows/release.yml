name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.head_commit.message, 'chore: release')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: release-plz
      - name: Configure git
        run: |
          git config user.email "release-plz[bot]@users.noreply.github.com"
          git config user.name "release-plz[bot]"
      - name: Run release-plz (release)
        run: RUST_LOG=release_plz=info release-plz release 2>&1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-pr-${{ github.ref }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: release-plz
      - name: Configure git
        run: |
          git config user.email "release-plz[bot]@users.noreply.github.com"
          git config user.name "release-plz[bot]"
      - name: Run release-plz (release-pr)
        run: RUST_LOG=release_plz=info release-plz release-pr 2>&1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
